name: GitHub Metrics

# Renders commit calendars, recently-used languages, and lines-of-code panels
# into a static SVG (github-metrics.svg) committed to this repo and referenced
# from README.md. Because the image is a
# committed file served by GitHub — not a live request to a shared third-party
# service — it can never be rate-limited or paused like the old
# github-readme-stats.vercel.app instance (which now returns HTTP 503
# DEPLOYMENT_PAUSED). If a run ever fails, the last committed SVG keeps rendering.
#
# Requires a repo secret `METRICS_TOKEN`: a *classic* GitHub Personal Access Token
# used only to READ stats. Fine-grained (github_pat_) tokens are rejected by
# metrics — GitHub doesn't support them for the GraphQL API it uses. A SCOPELESS
# token (no boxes checked) is sufficient and stays harmless if leaked (read-only
# public data, no writes, no private-repo contents). To include PRIVATE
# contribution counts in the calendar, keep the token scopeless and enable
# "Include private contributions on my profile" in GitHub profile settings — no
# broad `repo` scope needed. (Only private-repo *languages* would require `repo`,
# which is intentionally avoided.) The commit uses the workflow's built-in
# GITHUB_TOKEN, not this PAT.

on:
  schedule:
    # Daily at 01:10 UTC (offset from the blog workflow's 01:00).
    - cron: "10 1 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  github-metrics:
    name: Render github-metrics.svg
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics card
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: evanharmon1
          filename: github-metrics.svg
          output_action: commit
          output_condition: data-changed
          committer_message: "chore: update GitHub metrics"

          # "classic" template (light): the calendar plugin below only supports
          # classic, so the whole card uses it. Order matches the layout below.
          template: classic
          base: header
          config_timezone: America/Chicago
          config_order: base.header, isocalendar, calendar, languages, lines

          # Isometric commit calendar — half-year (180 days). Contribution counts
          # include private activity when "Include private contributions on my
          # profile" is enabled in GitHub settings (scopeless token is fine).
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # Full contribution calendar — current year (last 1 year).
          plugin_calendar: yes
          plugin_calendar_limit: 1

          # Languages — "recently used", computed from recent public push events
          # (last 30 days) via the events feed, NOT by cloning repos. With a
          # scopeless token this reflects PUBLIC activity only. Java/HTML and the
          # legacy repos are still filtered out.
          plugin_languages: yes
          plugin_languages_sections: recently-used
          plugin_languages_recent_days: 30
          plugin_languages_recent_load: 300
          plugin_languages_ignored: java, html
          plugin_languages_skipped: onthebaytours.com, jccc-html-css, evan-harmon-bootstrap, build-a-blog, html-me-something
          plugin_languages_limit: 8

          # Lines of code changed — top repositories + a diff-history graph. Uses
          # the GitHub statistics API (delay lets it settle); PUBLIC repos only
          # with a scopeless token.
          plugin_lines: yes
          plugin_lines_sections: repositories, history
          plugin_lines_delay: 30
